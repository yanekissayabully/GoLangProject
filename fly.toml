# fly.toml app configuration file generated for drivebai-api on 2026-02-09T13:19:29+05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'drivebai-api-team'
primary_region = 'ewr'

[build]

[env]
  UPLOAD_DIR = "/data/uploads"

[mounts]
  source = "drivebai_uploads"
  destination = "/data/uploads"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
